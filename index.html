<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bookmarkt (dev)</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin: 0; padding: 20px; background:#f6f7fb; color:#111; }
    .auth-screen { min-height: calc(100vh - 40px); min-height: calc(100dvh - 40px); display:flex; align-items:center; justify-content:center; }
    .auth-card { width:100%; max-width:460px; }
    .wrap { max-width:1100px; margin:0 auto; display:flex; gap:20px; }
    .col { background:#fff; padding:18px; border-radius:8px; box-shadow:0 6px 18px rgba(20,20,40,0.06); }
    .left { flex:1; }
    .right { width:360px; }
    h1 { margin:0 0 12px 0; font-size:20px; }
    label { display:block; margin-top:10px; font-size:13px; color:#444; }
    input[type="text"], input[type="email"], input[type="password"], textarea {
      width:100%; padding:8px 10px; margin-top:6px; border:1px solid #e3e6ee; border-radius:6px; font-size:14px;
      box-sizing: border-box;
    }
    button { margin-top:10px; padding:8px 12px; border-radius:6px; border:0; background:#2563eb; color:#fff; cursor:pointer; }
    button.secondary { background:#6b7280; }
    button.danger { background:#dc2626; }
    button.ghost { background:#eef2ff; color:#1e3a8a; border:1px solid #c7d2fe; }
    button.small-btn { margin-top:0; padding:4px 8px; font-size:12px; border-radius:5px; }
    .list { margin-top:12px; }
    .item { padding:10px; border-bottom:1px solid #f0f2f7; }
    .item.selectable { cursor:pointer; }
    .item.selected { background:#eff6ff; border-radius:6px; }
    .book-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .book-main { flex:1; min-width:0; }
    .character-card { padding:14px; border:1px solid #e5e7eb; border-radius:10px; margin-bottom:10px; background:#fafafa; }
    .character-name { margin:0 0 8px 0; font-size:20px; line-height:1.2; }
    .character-section { margin-top:10px; }
    .character-label { font-weight:600; color:#374151; margin-bottom:4px; }
    .character-value { color:#111827; line-height:1.5; white-space:pre-wrap; }
    .character-time { margin-top:10px; color:#6b7280; font-size:13px; }
    .image-dropzone {
      margin-top: 10px;
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      background: #f8fafc;
    }
    .image-dropzone.dragover { border-color:#2563eb; background:#eff6ff; }
    .image-dropzone.disabled { opacity:0.6; pointer-events:none; }
    .image-grid { margin-top:10px; display:grid; grid-template-columns:1fr; gap:10px; }
    .image-card { border:1px solid #e5e7eb; border-radius:8px; padding:8px; background:#fff; }
    .image-card img { width:100%; height:auto; border-radius:6px; display:block; }
    .image-caption { margin-top:6px; color:#374151; font-size:13px; white-space:pre-wrap; }
    .image-time { margin-top:4px; color:#6b7280; font-size:12px; }
    .muted { color:#6b7280; font-size:13px; }
    .status-error { color:#dc2626; font-size:13px; }
    .status-success { color:#15803d; font-size:13px; }
    .row { display:flex; gap:8px; align-items:center; }
    .small { font-size:13px; color:#374151; }
    .between { justify-content:space-between; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }
    .modal {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      padding: 16px;
    }
    .hidden { display: none !important; }

    @media (max-width: 900px) {
      body { padding: 12px; }
      .auth-screen { min-height: calc(100vh - 24px); min-height: calc(100dvh - 24px); }
      .wrap { flex-direction: column; gap: 12px; }
      .col { padding: 14px; }
      .right { width: auto; }
      .row { flex-wrap: wrap; }
      .between { justify-content: flex-start; align-items: flex-start; }
      #appUserStatus { word-break: break-word; }
      h1 { font-size: 24px; }
      .character-name { font-size: 18px; }
      button { padding: 10px 12px; }
      #bookImageDropzone button { margin-top: 8px; }
      .image-grid { grid-template-columns: 1fr; }
      .modal { max-width: 100%; }
    }

    @media (max-width: 520px) {
      body { padding: 10px; }
      .col { padding: 12px; }
      h1 { font-size: 22px; }
      .small { font-size: 12px; }
      button { width: 100%; }
      button.small-btn { width: auto; }
      .row > button.small-btn { width: auto; }
      .row { gap: 6px; }
    }
  </style>
</head>
<body>
  <div id="authScreen" class="auth-screen">
    <div class="col auth-card">
      <h1>Bookmarkt (dev)</h1>
      <section id="auth">
        <h2 class="small">Authentication</h2>
        <label>Email
          <input id="email" type="email" placeholder="you@example.com" />
        </label>
        <label>Password
          <input id="password" type="password" placeholder="password" />
        </label>
        <div class="row">
          <button id="btnLogin">Log In</button>
          <button id="btnSignup" class="secondary">Sign Up</button>
        </div>
        <div id="authStatus" class="muted"></div>
      </section>
    </div>
  </div>

  <div id="appShell" class="wrap" style="display:none;">
    <div class="col left">
      <h1>Bookmarkt (dev)</h1>

      <div class="row between">
        <div class="muted" id="appUserStatus"></div>
        <button id="btnLogout" class="secondary" type="button">Log Out</button>
      </div>

      <section id="topicsSection">
        <h2 class="small">Books</h2>
        <label>Add book
          <input id="newTopic" type="text" placeholder="e.g., Don Quixote" />
        </label>
        <button id="btnAddTopic" type="button">Add Book</button>
        <div id="topicsList" class="list"></div>
      </section>

      <hr />

      <section id="entriesSection">
        <h2 class="small">Entries</h2>
        <div class="small" id="entriesForBook"><strong>Entries for book:</strong> None</div>
        <label>Write your entry...
          <textarea id="entryText" rows="4" placeholder="Write your entry..."></textarea>
        </label>
        <div class="row">
          <button id="btnAddEntry">Add Entry</button>
          <button id="btnClearEntries" class="danger">Clear Entries</button>
        </div>
        <div id="entriesList" class="list"></div>
      </section>
    </div>

    <div class="col right">
      <h2 class="small">Character Map</h2>
      <div class="small" id="characterMapFor"><strong>Character map for book:</strong> None</div>
      <label>Character name
        <input id="characterName" type="text" placeholder="e.g., Frodo Baggins" />
      </label>
      <label>Role in story
        <input id="characterRole" type="text" placeholder="e.g., Main protagonist" />
      </label>
      <label>Character description
        <textarea id="characterDescription" rows="3" placeholder="Role, traits, and relationships..."></textarea>
      </label>
      <label>Relationships
        <textarea id="characterRelationships" rows="2" placeholder="e.g., Sam (best friend), Gandalf (mentor)"></textarea>
      </label>
      <div class="row">
        <button id="btnAddCharacter">Add Character</button>
        <button id="btnClearCharacterMap" class="danger">Clear Character Map</button>
      </div>
      <div id="charactersList" class="list"></div>

      <hr />

      <section id="imagesSection">
        <h2 class="small">Book Images</h2>
        <div class="small" id="imagesForBook"><strong>Images for book:</strong> None</div>
        <label>Optional image note
          <input id="imageCaption" type="text" placeholder="e.g., Family estate sketch" />
        </label>
        <div id="bookImageDropzone" class="image-dropzone">
          <div><strong>Drag and drop images here</strong></div>
          <div class="muted" style="margin-top:4px;">or choose files manually</div>
          <button id="btnPickImages" class="ghost" type="button">Choose Images</button>
          <button id="btnUploadImages" type="button">Upload/Save Images</button>
          <input id="bookImageInput" type="file" accept="image/*" multiple class="hidden" />
        </div>
        <div id="pendingImagesInfo" class="muted"></div>
        <div id="imageStatus" class="muted"></div>
        <div id="bookImagesList" class="image-grid"></div>
      </section>

      <hr />

      <div class="muted small" style="margin-top:12px;">
        Dev info:
        <div id="devInfo"></div>
      </div>
    </div>
  </div>

  <div id="signupModalBackdrop" class="modal-backdrop hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="signupTitle">
      <h2 id="signupTitle" class="small" style="font-size:18px; margin:0 0 10px 0;">Create account</h2>
      <label>Email
        <input id="signupEmail" type="email" placeholder="you@example.com" />
      </label>
      <label>Password
        <input id="signupPassword" type="password" placeholder="password" />
      </label>
      <label>Confirm password
        <input id="signupConfirmPassword" type="password" placeholder="confirm password" />
      </label>
      <div class="row">
        <button id="btnSignupConfirm">Create account</button>
        <button id="btnSignupCancel" class="secondary">Cancel</button>
      </div>
      <div id="signupStatus" class="muted"></div>
    </div>
  </div>

  <!-- IMPORTANT: ensure this file points to your local UMD bundle -->
  <script src="./supabase.js"></script>

  <script>
    // ======= CONFIGURE THIS =======
    // Replace the ANON_KEY placeholder below with your Supabase "anon public" key from:
    // Supabase Console -> Project -> Settings -> API -> anon public
    const SUPABASE_URL = "https://bfallxtcxxyykcnkedom.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_NzMdHQACfZknql5bcdcExQ_ZI2KllTq";
    // ==============================

    // Create the client (UMD bundle exposes window.supabase)
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM refs
    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const btnLogin = document.getElementById('btnLogin');
    const btnSignup = document.getElementById('btnSignup');
    const btnLogout = document.getElementById('btnLogout');
    const authStatus = document.getElementById('authStatus');
    const appUserStatus = document.getElementById('appUserStatus');
    const authScreen = document.getElementById('authScreen');
    const appShell = document.getElementById('appShell');
    const signupModalBackdrop = document.getElementById('signupModalBackdrop');
    const signupEmailEl = document.getElementById('signupEmail');
    const signupPasswordEl = document.getElementById('signupPassword');
    const signupConfirmPasswordEl = document.getElementById('signupConfirmPassword');
    const signupStatusEl = document.getElementById('signupStatus');
    const btnSignupConfirm = document.getElementById('btnSignupConfirm');
    const btnSignupCancel = document.getElementById('btnSignupCancel');

    const newTopicEl = document.getElementById('newTopic');
    const btnAddTopic = document.getElementById('btnAddTopic');
    const topicsList = document.getElementById('topicsList');
    const entriesForBookEl = document.getElementById('entriesForBook');

    const entryTextEl = document.getElementById('entryText');
    const btnAddEntry = document.getElementById('btnAddEntry');
    const btnClearEntries = document.getElementById('btnClearEntries');
    const entriesList = document.getElementById('entriesList');

    const characterNameEl = document.getElementById('characterName');
    const characterRoleEl = document.getElementById('characterRole');
    const characterDescriptionEl = document.getElementById('characterDescription');
    const characterRelationshipsEl = document.getElementById('characterRelationships');
    const btnAddCharacter = document.getElementById('btnAddCharacter');
    const btnClearCharacterMap = document.getElementById('btnClearCharacterMap');
    const characterMapForEl = document.getElementById('characterMapFor');
    const charactersList = document.getElementById('charactersList');
    const imagesForBookEl = document.getElementById('imagesForBook');
    const imageCaptionEl = document.getElementById('imageCaption');
    const bookImageDropzone = document.getElementById('bookImageDropzone');
    const btnPickImages = document.getElementById('btnPickImages');
    const btnUploadImages = document.getElementById('btnUploadImages');
    const bookImageInput = document.getElementById('bookImageInput');
    const pendingImagesInfoEl = document.getElementById('pendingImagesInfo');
    const imageStatusEl = document.getElementById('imageStatus');
    const bookImagesList = document.getElementById('bookImagesList');
    const hasImageUI = !!(bookImageDropzone && btnPickImages && btnUploadImages && bookImageInput && pendingImagesInfoEl && imageStatusEl && bookImagesList);
    const devInfo = document.getElementById('devInfo');
    const BOOK_IMAGES_BUCKET = 'book-images';
    let currentUser = null;
    let selectedBookId = null;
    let loadedBooks = [];
    let loadedEntries = [];
    let loadedCharacters = [];
    let loadedBookImages = [];
    let pendingImageFiles = [];
    const SELECTED_BOOK_KEY_PREFIX = 'bookmarkt-selected-book-';

    // Utility: show dev info
    function setDevInfo(text, isError) {
      devInfo.textContent = text;
      devInfo.className = isError ? 'status-error' : 'muted';
    }
    function setStatus(el, text) {
      el.textContent = text;
      if (!text) {
        el.className = 'muted';
        return;
      }
      if (text.toLowerCase().includes('error')) {
        el.className = 'status-error';
      } else {
        el.className = 'status-success';
      }
    }
    function setAuthStatus(text) { setStatus(authStatus, text); }
    function setSignupStatus(text) { setStatus(signupStatusEl, text); }
    function setImageStatus(text) {
      if (!imageStatusEl) return;
      setStatus(imageStatusEl, text);
    }
    function renderListError(message) { return `<div class="item status-error">${escapeHtml(message)}</div>`; }
    function setPendingImagesInfo(text) {
      if (!pendingImagesInfoEl) return;
      pendingImagesInfoEl.textContent = text;
    }

    function formatAuthError(actionLabel, error) {
      const msg = (error && error.message ? error.message : '').toLowerCase();
      if (
        msg.includes('invalid login credentials') ||
        msg.includes('invalid email or password') ||
        msg.includes('email not confirmed') ||
        msg.includes('user not found')
      ) {
        return `${actionLabel} error: Invalid email or password, or account does not exist.`;
      }
      return `${actionLabel} error: ${error.message}`;
    }

    function openSignupModal() {
      signupEmailEl.value = emailEl.value.trim();
      signupPasswordEl.value = '';
      signupConfirmPasswordEl.value = '';
      setSignupStatus('');
      signupModalBackdrop.classList.remove('hidden');
      signupModalBackdrop.setAttribute('aria-hidden', 'false');
      signupEmailEl.focus();
    }

    function closeSignupModal() {
      signupModalBackdrop.classList.add('hidden');
      signupModalBackdrop.setAttribute('aria-hidden', 'true');
      setSignupStatus('');
    }

    function setSignedInState(user) {
      const isSignedIn = !!user;
      authScreen.style.display = isSignedIn ? 'none' : 'flex';
      appShell.style.display = isSignedIn ? 'flex' : 'none';
      if (isSignedIn) closeSignupModal();

      btnLogin.disabled = isSignedIn;
      btnSignup.disabled = isSignedIn;
      btnLogout.disabled = !isSignedIn;
      appUserStatus.textContent = isSignedIn ? `Signed in as ${user.email}` : '';

      newTopicEl.disabled = !isSignedIn;
      btnAddTopic.disabled = !isSignedIn;
      syncBookScopedControlState();
    }

    function syncBookScopedControlState() {
      const hasSelectedBook = !!currentUser && !!selectedBookId;
      entryTextEl.disabled = !hasSelectedBook;
      btnAddEntry.disabled = !hasSelectedBook;
      btnClearEntries.disabled = !hasSelectedBook;
      characterNameEl.disabled = !hasSelectedBook;
      characterRoleEl.disabled = !hasSelectedBook;
      characterDescriptionEl.disabled = !hasSelectedBook;
      characterRelationshipsEl.disabled = !hasSelectedBook;
      btnAddCharacter.disabled = !hasSelectedBook;
      btnClearCharacterMap.disabled = !hasSelectedBook;
      imageCaptionEl.disabled = !hasSelectedBook;
      if (hasImageUI) {
        btnPickImages.disabled = !hasSelectedBook;
        btnUploadImages.disabled = !hasSelectedBook || pendingImageFiles.length === 0;
        bookImageInput.disabled = !hasSelectedBook;
        if (hasSelectedBook) {
          bookImageDropzone.classList.remove('disabled');
        } else {
          bookImageDropzone.classList.add('disabled');
        }
      }
    }

    function getSelectedBookName() {
      if (!selectedBookId) return 'None';
      const selectedBook = loadedBooks.find(b => String(b.id) === String(selectedBookId));
      return selectedBook ? selectedBook.name : 'None';
    }

    function getSelectedBookStorageKey() {
      if (!currentUser || !currentUser.id) return null;
      return `${SELECTED_BOOK_KEY_PREFIX}${currentUser.id}`;
    }

    function persistSelectedBook() {
      const key = getSelectedBookStorageKey();
      if (!key) return;
      if (!selectedBookId) {
        localStorage.removeItem(key);
        return;
      }
      localStorage.setItem(key, String(selectedBookId));
    }

    function restoreSelectedBook() {
      const key = getSelectedBookStorageKey();
      if (!key) return null;
      return localStorage.getItem(key);
    }

    function updateBookScopedLabels() {
      const bookName = getSelectedBookName();
      entriesForBookEl.innerHTML = `<strong>Entries for book:</strong> ${escapeHtml(bookName)}`;
      characterMapForEl.innerHTML = `<strong>Character map for book:</strong> ${escapeHtml(bookName)}`;
      imagesForBookEl.innerHTML = `<strong>Images for book:</strong> ${escapeHtml(bookName)}`;
    }

    function clearCharacterMapForm() {
      characterNameEl.value = '';
      characterRoleEl.value = '';
      characterDescriptionEl.value = '';
      characterRelationshipsEl.value = '';
      updateBookScopedLabels();
    }

    function extractStoragePathFromPublicUrl(url) {
      if (!url) return null;
      const marker = `/storage/v1/object/public/${BOOK_IMAGES_BUCKET}/`;
      const idx = url.indexOf(marker);
      if (idx < 0) return null;
      const encodedPath = url.substring(idx + marker.length);
      try {
        return decodeURIComponent(encodedPath);
      } catch (e) {
        return encodedPath;
      }
    }

    function refreshPendingImagesUI() {
      if (!pendingImageFiles.length) {
        setPendingImagesInfo('No image files selected.');
      } else {
        setPendingImagesInfo(`${pendingImageFiles.length} image file(s) selected. Add caption if needed, then click "Upload/Save Images".`);
      }
      syncBookScopedControlState();
    }

    function queueImageFiles(files) {
      const imageFiles = files.filter(f => f && typeof f.type === 'string' && f.type.startsWith('image/'));
      if (!imageFiles.length) {
        setImageStatus('Images error: Please select image files only.');
        return;
      }
      pendingImageFiles = pendingImageFiles.concat(imageFiles);
      refreshPendingImagesUI();
      setImageStatus('');
    }

    async function selectBook(bookId) {
      if (!currentUser) return;
      selectedBookId = String(bookId);
      persistSelectedBook();
      renderTopics(loadedBooks);
      updateBookScopedLabels();
      syncBookScopedControlState();
      await Promise.allSettled([
        loadEntries(currentUser.id, selectedBookId),
        loadCharacters(currentUser.id, selectedBookId),
        loadBookImages(currentUser.id, selectedBookId)
      ]);
    }

    async function getCurrentUser() {
      const { data, error } = await supabase.auth.getUser();
      if (error) throw error;
      return data.user;
    }

    function requireCurrentUser() {
      if (!currentUser) {
        alert('Please log in first.');
        return null;
      }
      return currentUser;
    }

    // ======= Auth handlers =======
    async function signUp() {
      const email = signupEmailEl.value.trim();
      const password = signupPasswordEl.value;
      const confirmPassword = signupConfirmPasswordEl.value;
      if (!email || !password) return alert('Provide email and password');
      if (password !== confirmPassword) {
        setSignupStatus('Sign up error: Password and confirm password must match.');
        return;
      }
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) {
        const errMsg = formatAuthError('Sign up', error);
        setSignupStatus(errMsg);
        setAuthStatus(errMsg);
      } else {
        if (data.session && data.user) {
          setAuthStatus('Sign up successful and logged in.');
          closeSignupModal();
          await refreshAll();
        } else {
          setSignupStatus('Sign up successful. Check your email to confirm your account.');
          setAuthStatus('Sign up successful. Check your email to confirm your account.');
        }
      }
    }

    async function signIn() {
      const email = emailEl.value.trim();
      const password = passwordEl.value;
      if (!email || !password) return alert('Provide email and password');
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        setAuthStatus(formatAuthError('Login', error));
      } else {
        setAuthStatus('Logged in');
        await refreshAll();
      }
    }

    async function signOut() {
      let primaryError = null;
      const primaryRes = await supabase.auth.signOut();
      if (primaryRes.error) {
        primaryError = primaryRes.error;
        // Fallback: clear only local session so user can still leave the account UI.
        const localRes = await supabase.auth.signOut({ scope: 'local' });
        if (localRes.error) {
          setAuthStatus('Logout error: ' + localRes.error.message);
          setDevInfo('Logout error: ' + localRes.error.message, true);
          return;
        }
      }
      currentUser = null;
      setSignedInState(null);
      if (primaryError) {
        setAuthStatus('Logged out (local session cleared).');
        setDevInfo('Logged out with local fallback. Global logout had an error: ' + primaryError.message, true);
      } else {
        setAuthStatus('Logged out');
        setDevInfo('Logged out.');
      }
      renderEmptyLists();
    }

    // ======= Data operations =======
    async function loadTopics(userId) {
      try {
        const res = await supabase
          .from('topics')
          .select('*')
          .eq('user_id', userId)
          .order('created_at', { ascending: false });
        if (res.error) throw res.error;
        loadedBooks = res.data || [];
        const restoredBookId = restoreSelectedBook();
        if (!loadedBooks.length) {
          selectedBookId = null;
        } else if (restoredBookId && loadedBooks.some(b => String(b.id) === String(restoredBookId))) {
          selectedBookId = String(restoredBookId);
        } else if (!selectedBookId || !loadedBooks.some(b => String(b.id) === String(selectedBookId))) {
          selectedBookId = String(loadedBooks[0].id);
        }
        persistSelectedBook();
        renderTopics(loadedBooks);
        updateBookScopedLabels();
        syncBookScopedControlState();
      } catch (err) {
        console.error('loadTopics error', err);
        topicsList.innerHTML = renderListError(`Error loading books: ${err.message || 'Unknown error'}`);
      }
    }

    async function loadEntries(userId, bookId) {
      if (!bookId) {
        entriesList.innerHTML = '<div class="item muted">Select a book to view entries.</div>';
        loadedEntries = [];
        return;
      }
      try {
        const res = await supabase
          .from('entries')
          .select('*')
          .eq('user_id', userId)
          .eq('topic_id', bookId)
          .order('created_at', { ascending: false });
        if (res.error) throw res.error;
        loadedEntries = res.data || [];
        renderEntries(loadedEntries);
      } catch (err) {
        console.error('loadEntries error', err);
        entriesList.innerHTML = renderListError(`Error loading entries: ${err.message || 'Unknown error'}`);
      }
    }

    async function loadCharacters(userId, bookId) {
      if (!bookId) {
        charactersList.innerHTML = '<div class="item muted">Select a book to view character maps.</div>';
        loadedCharacters = [];
        return;
      }
      try {
        const res = await supabase
          .from('characters')
          .select('*')
          .eq('user_id', userId)
          .eq('topic_id', bookId)
          .order('created_at', { ascending: false });
        if (res.error) throw res.error;
        loadedCharacters = res.data || [];
        renderCharacters(loadedCharacters);
      } catch (err) {
        console.error('loadCharacters error', err);
        charactersList.innerHTML = renderListError(`Error loading characters: ${err.message || 'Unknown error'}`);
      }
    }

    async function loadBookImages(userId, bookId) {
      if (!bookId) {
        if (!bookImagesList) return;
        bookImagesList.innerHTML = '<div class="item muted">Select a book to view images.</div>';
        loadedBookImages = [];
        return;
      }
      try {
        const res = await supabase
          .from('book_images')
          .select('*')
          .eq('user_id', userId)
          .eq('topic_id', bookId)
          .order('created_at', { ascending: false });
        if (res.error) throw res.error;
        loadedBookImages = res.data || [];
        renderBookImages(loadedBookImages);
      } catch (err) {
        console.error('loadBookImages error', err);
        const msg = err && err.message ? err.message : 'Unknown error';
        const hint = msg.toLowerCase().includes('book_images')
          ? 'book_images table is missing. Run the SQL setup script.'
          : msg;
        setImageStatus(`Images error: ${hint}`);
        if (bookImagesList) {
          bookImagesList.innerHTML = renderListError(`Error loading images: ${hint}`);
        }
      }
    }

    async function uploadBookImages() {
      if (!hasImageUI) return;
      const user = requireCurrentUser();
      if (!user) return;
      if (!selectedBookId) return alert('Add and select a book first.');
      const imageFiles = pendingImageFiles.slice();
      if (!imageFiles.length) {
        setImageStatus('Images error: Select images first, then click Upload/Save Images.');
        return;
      }
      setImageStatus('');

      const caption = imageCaptionEl.value.trim();
      for (const file of imageFiles) {
        const fileExtRaw = file.name && file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : 'jpg';
        const fileExt = (fileExtRaw || 'jpg').replace(/[^a-z0-9]/g, '') || 'jpg';
        const filePath = `${user.id}/${selectedBookId}/${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${fileExt}`;

        const uploadRes = await supabase.storage
          .from(BOOK_IMAGES_BUCKET)
          .upload(filePath, file, { upsert: false });
        if (uploadRes.error) {
          setImageStatus(`Image upload error: ${uploadRes.error.message}`);
          setDevInfo(`Image upload error: ${uploadRes.error.message}`, true);
          return;
        }

        const { data: publicUrlData } = supabase.storage.from(BOOK_IMAGES_BUCKET).getPublicUrl(filePath);
        const imageUrl = publicUrlData && publicUrlData.publicUrl ? publicUrlData.publicUrl : null;
        if (!imageUrl) {
          setImageStatus('Image upload error: Could not retrieve public URL.');
          setDevInfo('Image upload error: Could not retrieve public URL.', true);
          return;
        }

        const insertRes = await supabase
          .from('book_images')
          .insert([{
            user_id: user.id,
            topic_id: selectedBookId,
            image_url: imageUrl,
            caption: caption || null
          }]);
        if (insertRes.error) {
          setImageStatus(`Save image metadata error: ${insertRes.error.message}`);
          setDevInfo(`Save image metadata error: ${insertRes.error.message}`, true);
          return;
        }
      }

      imageCaptionEl.value = '';
      bookImageInput.value = '';
      pendingImageFiles = [];
      refreshPendingImagesUI();
      setImageStatus('Images uploaded successfully.');
      await loadBookImages(user.id, selectedBookId);
    }

    async function deleteBook(bookId) {
      const user = requireCurrentUser();
      if (!user) return;
      if (!bookId) return;
      if (!confirm('Delete this book and all related entries, character maps, and image records?')) return;

      try {
        // Remove related image files from storage first (DB rows will cascade on topic delete).
        const imagesRes = await supabase
          .from('book_images')
          .select('image_url')
          .eq('user_id', user.id)
          .eq('topic_id', bookId);
        if (imagesRes.error) throw imagesRes.error;

        const storagePaths = (imagesRes.data || [])
          .map(img => extractStoragePathFromPublicUrl(img.image_url))
          .filter(Boolean);
        if (storagePaths.length) {
          const removeRes = await supabase.storage.from(BOOK_IMAGES_BUCKET).remove(storagePaths);
          if (removeRes.error) throw removeRes.error;
        }

        const deleteRes = await supabase
          .from('topics')
          .delete()
          .eq('id', bookId)
          .eq('user_id', user.id);
        if (deleteRes.error) throw deleteRes.error;

        if (String(selectedBookId) === String(bookId)) {
          selectedBookId = null;
          persistSelectedBook();
        }
        await loadTopics(user.id);
        await Promise.allSettled([
          loadEntries(user.id, selectedBookId),
          loadCharacters(user.id, selectedBookId),
          loadBookImages(user.id, selectedBookId)
        ]);
      } catch (err) {
        setDevInfo('Delete book error: ' + (err && err.message ? err.message : 'Unknown error'), true);
      }
    }

    // ======= Render helpers =======
    function formatTimestamp(value) {
      if (!value) return 'No date';
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? 'Invalid date' : d.toLocaleString();
    }

    function formatRecordTimestamp(record) {
      const created = formatTimestamp(record.created_at);
      const hasUpdatedAt = !!record.updated_at;
      if (!hasUpdatedAt) return created;
      const createdMs = record.created_at ? new Date(record.created_at).getTime() : 0;
      const updatedMs = record.updated_at ? new Date(record.updated_at).getTime() : 0;
      const edited = Number.isFinite(createdMs) && Number.isFinite(updatedMs) && updatedMs - createdMs > 1000;
      return edited ? `${created} (edited)` : created;
    }

    function parseCharacterDescription(description) {
      const parsed = { role: '', description: '', relationships: '' };
      const text = description || '';
      const lines = text.split('\n').map(line => line.trim()).filter(Boolean);
      for (const line of lines) {
        if (line.startsWith('Role:')) {
          parsed.role = line.substring(5).trim();
        } else if (line.startsWith('Description:')) {
          parsed.description = line.substring(12).trim();
        } else if (line.startsWith('Relationships:')) {
          parsed.relationships = line.substring(14).trim();
        }
      }
      if (!parsed.role && !parsed.description && !parsed.relationships) {
        parsed.description = text.trim();
      }
      return parsed;
    }

    // Simple HTML escape
    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/[&<>"']/g, function (m) {
        return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m];
      });
    }

    // On load: quick client check and initial fetch
    (async function init() {
      try {
        setDevInfo('Initializing...');
        if (!window.supabase || typeof window.supabase.createClient !== 'function') {
          throw new Error('Supabase client bundle not loaded. Check ./supabase.js path.');
        }
        // Basic client sanity check
        console.log('supabase present?', !!window.supabase);
        console.log('createClient type:', typeof window.supabase.createClient);
        // Attempt to fetch entries (will show errors in console if network/policies block)
        setSignedInState(null);
        updateBookScopedLabels();
        setPendingImagesInfo('No image files selected.');
        await refreshAll();
      } catch (err) {
        console.error('init error', err);
        setDevInfo('Initialization error. See console.', true);
      }
    })();
  </script>
